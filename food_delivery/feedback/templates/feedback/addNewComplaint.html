<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Complaint</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #fff4e5 0%, #ffe0b2 45%, #ff8a65 100%);
            color: #4a0b0b;
            min-height: 100vh;
        }
        .page-shell {
            max-width: 760px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            background: #b71c1c;
            padding: 18px 24px;
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(183, 28, 28, 0.18);
        }
        .nav a {
            color: #fff8e1;
            text-decoration: none;
            font-weight: 700;
        }
        .nav a:hover {
            color: #ffeb3b;
        }
        .content {
            margin-top: 30px;
            background: rgba(255,255,255,0.96);
            border-radius: 26px;
            padding: 32px;
            border: 1px solid #ffd54f;
            box-shadow: 0 22px 32px rgba(0,0,0,0.12);
        }
        h1 {
            margin-top: 0;
            color: #b71c1c;
        }
        .success {
            margin-bottom: 24px;
            padding: 16px 18px;
            border-radius: 16px;
            background: #fff8e1;
            border: 1px solid #ffd54f;
            color: #5d3103;
        }
        form {
            display: grid;
            gap: 18px;
        }
        label {
            font-weight: 700;
            color: #7b1f1f;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #d93a30;
            background: #fff3e0;
            font-size: 1rem;
            color: #420e0e;
        }
        textarea {
            width: 95%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #d93a30;
            background: #fff3e0;
            font-size: 1rem;
            color: #420e0e;
        }
        button {
            width: fit-content;
            background: #f9a825;
            color: #4e2600;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(209, 68, 45, 0.18);
        }
        button:hover {
            background: #ffb300;
        }
        .back-link {
            color: #b71c1c;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="nav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'edit_profile' %}">Edit Profile</a>
            <a href="{% url 'feedback_add_new_complaint' %}">Add Complaint</a>
            <a href="{% url 'logout' %}">Log Off</a>
        </div>

        <div class="content">
            <h1>Add New Complaint</h1>
            {% if success %}
                <div class="success">Complaint submitted successfully.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Save Complaint</button>
            </form>
            <p><a class="back-link" href="{% url 'home' %}">Back to Home</a></p>
        </div>
    </div>
</body>
</html>
