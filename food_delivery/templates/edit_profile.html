<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - Food Delivery System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .nav { background-color: #f0f0f0; padding: 10px; margin-bottom: 20px; }
        .nav a { margin-right: 20px; text-decoration: none; color: #333; }
        .nav a:hover { color: #007bff; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 4px; }
        button { margin-top: 20px; padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'edit_profile' %}">Edit Profile</a>
        <a href="{% url 'feedback_add_new_complaint' %}">Add New Record</a>
        <a href="{% url 'logout' %}">Log Off</a>
    </div>

    <h1>Edit Your Profile</h1>

    {% if messages %}
        <div style="margin-bottom: 20px;">
            {% for message in messages %}
                <p style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %};">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" required>

        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required>

        <button type="submit">Update Profile</button>
    </form>

    <p><a href="{% url 'home' %}">Back to Home</a></p>
</body>
</html>
