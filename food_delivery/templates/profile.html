<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"] { width: 100%; max-width: 300px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .messages { list-style-type: none; padding: 0; }
        .messages li { padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .messages .success { background-color: #d4edda; color: #155724; }
        .messages .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Edit Profile</h2>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form action="" method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username (Cannot be changed):</label>
            <input type="text" value="{{ user.username }}" disabled>
        </div>

        <div class="form-group">
            <label>First Name:</label>
            <input type="text" name="first_name" value="{{ user.first_name }}">
        </div>

        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" name="last_name" value="{{ user.last_name }}">
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>

        <button type="submit">Save Changes</button>
    </form>

    <br>
    <a href="/">Back to Dashboard</a>
</body>
</html>
