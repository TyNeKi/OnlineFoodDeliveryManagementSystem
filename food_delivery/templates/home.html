<!DOCTYPE html>
<html>
<head>
    <title>Home - Food Delivery System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .nav { background-color: #f0f0f0; padding: 10px; margin-bottom: 20px; }
        .nav a { margin-right: 20px; text-decoration: none; color: #333; }
        .nav a:hover { color: #007bff; }
        .welcome { margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'edit_profile' %}">Edit Profile</a>
        <a href="{% url 'add_user' %}">Add New Record</a>
        <a href="{% url 'logout' %}">Log Off</a>
    </div>

    <div class="welcome">
        <h1>WELCOME {{ user.username }}</h1>
    </div>

    <div>
        <h2>Navigation</h2>
        <ul>
            <li><a href="{% url 'edit_profile' %}">Edit Your Profile</a></li>
            <li><a href="{% url 'add_user' %}">Add New Record</a></li>
            <li><a href="{% url 'logout' %}">Log Off</a></li>
        </ul>
    </div>

    {% if messages %}
        <div style="margin-top: 20px;">
            {% for message in messages %}
                <p style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %};">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
</body>
</html>
