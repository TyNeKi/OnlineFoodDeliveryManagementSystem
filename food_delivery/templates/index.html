<!DOCTYPE html>
<html>
<head>
    <title>Food Delivery Project</title>
</head>
<body>
    <h1>Welcome to the Food Delivery Dashboard</h1>

    {% if user.is_authenticated %}
        <p style="color: green;">Success! You are currently logged in as: <b>{{ user.username }}</b></p>
        <p>Your registered email: {{ user.email }}</p>
        <br>
        <a href="{% url 'home' %}">Go to Home Page</a> | <a href="/admin/">Go to Admin Panel</a>

    {% else %}
        <p>Please log in to continue.</p>
        <nav>
            <ul>
                <li><a href="{% url 'login' %}">Login Page</a></li>
            </ul>
        </nav>
    {% endif %}

</body>
</html>
